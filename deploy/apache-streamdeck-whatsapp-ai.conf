# Tambahkan baris ini di VirtualHost streamdeck.arisdev.my.id.
# Letakkan setelah aturan .well-known dan sebelum rewrite redirect umum jika ada.

ProxyPreserveHost On
ProxyRequests Off

# Jangan ganggu Let's Encrypt.
ProxyPass /.well-known !

# Backend Flask Docker, hanya path /api.
ProxyPass /api http://127.0.0.1:5050/api
ProxyPassReverse /api http://127.0.0.1:5050/api

# WebSocket relay existing tetap seperti konfigurasi kamu.
ProxyPass /ws ws://127.0.0.1:8765/
ProxyPassReverse /ws ws://127.0.0.1:8765/
