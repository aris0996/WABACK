{% extends "app_layout.html" %}
{% block content %}
<section id="view-logs" class="view active">
  <div class="section-head">
    <div>
      <h2>Logs</h2>
      <p class="note">Gunakan filter `github`, `waha`, `ollama`, atau `error` untuk mempercepat cek masalah.</p>
    </div>
    <div class="inline-form narrow">
      <input id="log-filter" placeholder="Filter log">
      <select id="log-level">
        <option value="">Semua level</option>
        <option value="ERROR">ERROR</option>
        <option value="WARNING">WARNING</option>
        <option value="INFO">INFO</option>
      </select>
      <button id="refresh-logs" type="button">Refresh</button>
    </div>
  </div>
  <div class="table-wrap"><table id="logs-table"></table></div>
</section>
{% endblock %}
